{% extends "base.html" %}
{% block title %}Создать чат - Social{% endblock %}
{% block content %}
    <div style="max-width: 500px; margin: 40px auto;">
        <div class="card">
            <h2>Создать групповой чат</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Название чата</label>
                    <input type="text" name="name" required placeholder="Например: Друзья">
                </div>
                <div class="form-group">
                    <label>Участники</label>
                    {% for user in users %}
                        <div style="display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border);">
                            <input type="checkbox" name="members" value="{{ user.id }}" style="width: auto; margin-right: 10px;">
                            <div class="avatar" style="width: 30px; height: 30px; margin-right: 10px; font-size: 0.8rem;">
                                {% if user.avatar != 'default.png' %}
                                    <img src="{{ url_for('uploaded_file', filename=user.avatar) }}" alt="" style="width: 100%; height: 100%; object-fit: cover;">
                                {% else %}
                                    {{ user.username[0].upper() }}
                                {% endif %}
                            </div>
                            <span>{{ user.username }}</span>
                        </div>
                    {% endfor %}
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Создать</button>
                    <a href="{{ url_for('messages') }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
