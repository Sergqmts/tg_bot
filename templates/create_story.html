<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Создать историю - Vibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            start: '#FF3CAC',
                            middle: '#784BA0',
                            end: '#2B86C5',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .story-ring { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto min-h-screen bg-[#000] dark:bg-[#000] text-white">
        <div class="sticky top-0 z-50 bg-black/80 backdrop-blur-md px-4 py-3 flex items-center justify-between">
            <a href="{{ url_for('index') }}" class="text-white hover:text-gray-300 transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-lg font-bold">Создать историю</h1>
            <span class="w-6"></span>
        </div>
        
        <div class="p-4 space-y-4">
            <div class="flex gap-3">
                <a href="{{ url_for('proxy_photo_editor', target='story', return=url_for('create_story')) }}" class="flex-1 flex items-center justify-center gap-2 p-4 bg-gradient-to-r from-purple-600 to-pink-500 rounded-2xl hover:opacity-90 transition-all">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span class="text-sm font-bold">Редактор</span>
                </a>
                <button class="flex-1 flex items-center justify-center gap-2 p-4 bg-slate-800 rounded-2xl hover:bg-slate-700 transition-all" onclick="openCamera()">
                    <i class="fa-solid fa-camera text-brand-middle"></i>
                    <span class="text-sm">Камера</span>
                </button>
                <button class="flex-1 flex items-center justify-center gap-2 p-4 bg-slate-800 rounded-2xl hover:bg-slate-700 transition-all" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-images text-brand-middle"></i>
                    <span class="text-sm">Галерея</span>
                </button>
            </div>
            
            <div id="cameraSection" class="hidden">
                <div class="relative rounded-2xl overflow-hidden bg-slate-800" style="aspect-ratio: 9/16; max-height: 60vh;">
                    <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
                </div>
                <div class="flex justify-center gap-4 mt-3">
                    <button class="w-12 h-12 rounded-full border-2 border-white flex items-center justify-center text-white hover:bg-white/20 transition-all" onclick="flipCamera()" title="Переключить">
                        <i class="fa-solid fa-rotate text-lg"></i>
                    </button>
                    <button class="w-12 h-12 rounded-full bg-white flex items-center justify-center hover:bg-gray-200 transition-all" onclick="capturePhoto()" title="Снять">
                        <div class="w-8 h-8 rounded-full border-2 border-gray-800"></div>
                    </button>
                    <button class="w-12 h-12 rounded-full bg-red-500 flex items-center justify-center text-white hover:bg-red-600 transition-all" onclick="toggleRecord()" title="Записать" id="recordBtn">
                        <i class="fa-solid fa-circle text-sm"></i>
                    </button>
                </div>
            </div>
            
            <input type="file" id="fileInput" accept="image/*,video/*" class="hidden" onchange="handleFile(this)">
            
            <div id="previewContainer" class="hidden">
                <div class="relative rounded-2xl overflow-hidden bg-slate-800" style="aspect-ratio: 9/16; max-height: 60vh;">
                    <img id="previewImg" class="w-full h-full object-contain hidden">
                    <video id="previewVideo" class="w-full h-full object-contain hidden" controls></video>
                </div>
                
                <div id="filtersPanel" class="hidden">
                    <div class="flex gap-2 overflow-x-auto py-3">
                        <button class="flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden border-2 border-brand-middle" onclick="applyFilter('none')">
                            <span class="block p-2 text-xs text-center">Оригинал</span>
                        </button>
                        <button class="flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden border-2 border-transparent" onclick="applyFilter('grayscale(100%)')">
                            <div class="w-full h-full bg-gray-500"></div>
                        </button>
                        <button class="flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden border-2 border-transparent" onclick="applyFilter('sepia(100%)')">
                            <div class="w-full h-full" style="background: #704214;"></div>
                        </button>
                        <button class="flex-shrink-0 w-14 h-14 rounded-xl overflow-hidden border-2 border-transparent" onclick="applyFilter('saturate(200%)')">
                            <div class="w-full h-full bg-green-500"></div>
                        </button>
                    </div>
                </div>
            </div>
            
            <form method="POST" id="storyForm" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="media_data" id="mediaData">
                <button type="submit" class="w-full p-3 bg-gradient-to-r from-brand-start to-brand-middle text-white rounded-2xl font-bold text-sm hover:shadow-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed" id="submitBtn" disabled>
                    Опубликовать
                </button>
            </form>
        </div>
    </div>
    
    <script>
        (function() {
            var editorPhoto = sessionStorage.getItem('editor_photo');
            if (editorPhoto) {
                sessionStorage.removeItem('editor_photo');
                fetch(editorPhoto).then(function(r) { return r.blob(); }).then(function(blob) {
                    var file = new File([blob], 'edited_photo.jpg', { type: 'image/jpeg' });
                    showPreview(file);
                });
            }
        })();

        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let currentCamera = 'user';
        
        async function openCamera() {
            try {
                const video = document.getElementById('video');
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentCamera },
                    audio: true
                });
                video.srcObject = stream;
                document.getElementById('cameraSection').classList.remove('hidden');
            } catch (err) {
                alert('Не удалось открыть камеру: ' + err.message);
            }
        }
        
        function flipCamera() {
            currentCamera = currentCamera === 'user' ? 'environment' : 'user';
            openCamera();
        }
        
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const w = video.videoWidth || 1080;
            const h = video.videoHeight || 1920;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, w, h);
            canvas.toBlob(blob => {
                const file = new File([blob], 'photo.jpg', { type: 'image/jpeg' });
                showPreview(file);
            }, 'image/jpeg', 0.95);
        }
        
        function toggleRecord() {
            const btn = document.getElementById('recordBtn');
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    showPreview(new File([blob], 'video.mp4', { type: 'video/mp4' }));
                };
                mediaRecorder.start();
                isRecording = true;
                btn.innerHTML = '<i class="fa-solid fa-stop text-sm"></i>';
                setTimeout(() => { if (isRecording) { mediaRecorder.stop(); isRecording = false; btn.innerHTML = '<i class="fa-solid fa-circle text-sm"></i>'; } }, 15000);
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.innerHTML = '<i class="fa-solid fa-circle text-sm"></i>';
            }
        }
        
        function handleFile(input) {
            if (input.files[0]) showPreview(input.files[0]);
        }
        
        function showPreview(file) {
            document.getElementById('cameraSection').classList.add('hidden');
            const container = document.getElementById('previewContainer');
            const img = document.getElementById('previewImg');
            const video = document.getElementById('previewVideo');
            const submitBtn = document.getElementById('submitBtn');
            const filtersPanel = document.getElementById('filtersPanel');
            
            container.classList.remove('hidden');
            if (file.type.startsWith('image/')) {
                filtersPanel.classList.remove('hidden');
                img.classList.remove('hidden');
                video.classList.add('hidden');
                img.src = URL.createObjectURL(file);
            } else {
                filtersPanel.classList.add('hidden');
                img.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = URL.createObjectURL(file);
            }
            submitBtn.classList.remove('disabled');
            submitBtn.disabled = false;
            
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('mediaData').value = reader.result; };
            reader.readAsDataURL(file);
        }
        
        function applyFilter(filter) {
            document.getElementById('previewImg').style.filter = filter;
            document.querySelectorAll('[onclick^="applyFilter"]').forEach(b => b.classList.remove('border-brand-middle'));
            event.target.closest('button').classList.add('border-brand-middle');
        }
        
        document.getElementById('storyForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Публикация...';
            
            const formData = new FormData();
            formData.append('media_data', document.getElementById('mediaData').value);
            const csrfInput = document.querySelector('input[name="csrf_token"]');
            if (csrfInput) formData.append('csrf_token', csrfInput.value);
            
            try {
                const resp = await fetch('{{ url_for("create_story") }}', { method: 'POST', body: formData });
                if (resp.ok) window.location.href = '{{ url_for("index") }}';
                else { alert('Ошибка'); btn.disabled = false; btn.textContent = 'Опубликовать'; }
            } catch (err) { alert(err.message); btn.disabled = false; }
        };
    </script>
</body>
</html>
