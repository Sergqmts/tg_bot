<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Создать историю - Social</title>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.classList.add('light-mode');
        }
    </script>
    <style>
        :root { --bg: #000; --text: #fff; --surface: #262626; --border: #262626; }
        .light-mode { --bg: #fff; --text: #000; --surface: #f0f0f0; --border: #dbdbdb; }
        :root { --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
        
        .ig-create-container { max-width: 420px; margin: 0 auto; padding: 20px; background: var(--bg); }
        .ig-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .ig-header h1 { font-size: 20px; font-weight: 600; }
        .ig-header a { color: #0095f6; font-size: 14px; font-weight: 600; text-decoration: none; }
        
        .ig-source-btns { display: flex; gap: 12px; margin-bottom: 16px; }
        .ig-source-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px; background: var(--surface); border: none; border-radius: 8px; color: var(--text); font-size: 14px; cursor: pointer; }
        
        .ig-camera-section { display: none; margin-bottom: 16px; }
        .ig-camera-section.active { display: block; }
        .ig-video-preview { width: 100%; aspect-ratio: 9/16; max-height: 60vh; border-radius: 8px; object-fit: cover; background: var(--surface); }
        
        .ig-camera-controls { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }
        .ig-cam-btn { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--text); background: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ig-cam-btn.flip { transform: scaleX(-1); }
        .ig-cam-btn.record { background: #ff3b30; border-color: #ff3b30; }
        
        .ig-preview-container { position: relative; width: 100%; aspect-ratio: 9/16; max-height: 60vh; border-radius: 8px; overflow: hidden; margin-bottom: 16px; display: none; }
        .ig-preview-container.active { display: block; }
        .ig-preview-img, .ig-preview-video { width: 100%; height: 100%; object-fit: contain; background: var(--surface); }
        
        .ig-submit-btn { width: 100%; padding: 14px; background: #0095f6; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .ig-submit-btn.active { display: block; }
        .ig-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .ig-filters-panel { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0; display: none; }
        .ig-filters-panel.active { display: flex; }
        .ig-filter-btn { flex-shrink: 0; width: 56px; height: 56px; border-radius: 8px; overflow: hidden; border: 2px solid transparent; cursor: pointer; }
        .ig-filter-btn.active { border-color: #0095f6; }
    </style>
</head>
<body>
    <div class="ig-create-container">
        <div class="ig-header">
            <a href="{{ url_for('index') }}">← Назад</a>
            <h1>Создать историю</h1>
            <span></span>
        </div>
        
        <div class="ig-source-btns">
            <button class="ig-source-btn" onclick="openCamera()">
                <span>📷</span> Камера
            </button>
            <button class="ig-source-btn" onclick="document.getElementById('fileInput').click()">
                <span>🖼️</span> Галерея
            </button>
        </div>
        
        <div class="ig-camera-section" id="cameraSection">
            <video id="video" class="ig-video-preview" autoplay playsinline muted></video>
            <div class="ig-camera-controls">
                <button class="ig-cam-btn flip" onclick="flipCamera()" title="Переключить">🔄</button>
                <button class="ig-cam-btn" onclick="capturePhoto()" title="Снять">⚪</button>
                <button class="ig-cam-btn record" onclick="toggleRecord()" title="Записать" id="recordBtn">⏺</button>
            </div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" onchange="handleFile(this)">
        
        <div class="ig-preview-container" id="previewContainer">
            <img id="previewImg" class="ig-preview-img" style="display: none;">
            <video id="previewVideo" class="ig-preview-video" controls style="display: none;"></video>
            
            <div class="ig-filters-panel" id="filtersPanel">
                <button class="ig-filter-btn active" onclick="applyFilter('none')"><span style="display:block;padding:8px;font-size:11px;">Оригинал</span></button>
                <button class="ig-filter-btn" onclick="applyFilter('grayscale(100%)')"><span style="filter:grayscale(1);display:block;height:32px;"></span></button>
                <button class="ig-filter-btn" onclick="applyFilter('sepia(100%)')"><span style="filter:sepia(1);display:block;height:32px;background:#704214;"></span></button>
                <button class="ig-filter-btn" onclick="applyFilter('saturate(200%)')"><span style="filter:saturate(2);display:block;height:32px;"></span></button>
                <button class="ig-filter-btn" onclick="applyFilter('hue-rotate(90deg)')"><span style="filter:hue-rotate(90deg);display:block;height:32px;background:#809080;"></span></button>
                <button class="ig-filter-btn" onclick="applyFilter('brightness(130%)')"><span style="filter:brightness(1.3);display:block;height:32px;"></span></button>
            </div>
        </div>
        
        <form method="POST" id="storyForm" enctype="multipart/form-data">
            <input type="hidden" name="media_data" id="mediaData">
            <button type="submit" class="ig-submit-btn" id="submitBtn" disabled>Опубликовать</button>
        </form>
    </div>
    
    <script>
        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let currentCamera = 'user';
        
        async function openCamera() {
            try {
                const video = document.getElementById('video');
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentCamera },
                    audio: true
                });
                video.srcObject = stream;
                document.getElementById('cameraSection').classList.add('active');
            } catch (err) {
                alert('Не удалось открыть камеру: ' + err.message);
            }
        }
        
        function flipCamera() {
            currentCamera = currentCamera === 'user' ? 'environment' : 'user';
            openCamera();
        }
        
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const w = video.videoWidth || 1080;
            const h = video.videoHeight || 1920;
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, w, h);
            canvas.toBlob(blob => {
                const file = new File([blob], 'photo.jpg', { type: 'image/jpeg' });
                showPreview(file);
            }, 'image/jpeg', 0.95);
        }
        
        function toggleRecord() {
            const btn = document.getElementById('recordBtn');
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    showPreview(new File([blob], 'video.mp4', { type: 'video/mp4' }));
                };
                mediaRecorder.start();
                isRecording = true;
                btn.textContent = '⏹';
                setTimeout(() => { if (isRecording) { mediaRecorder.stop(); isRecording = false; btn.textContent = '⏺'; } }, 15000);
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.textContent = '⏺';
            }
        }
        
        function handleFile(input) {
            if (input.files[0]) showPreview(input.files[0]);
        }
        
        function showPreview(file) {
            document.getElementById('cameraSection').classList.remove('active');
            const container = document.getElementById('previewContainer');
            const img = document.getElementById('previewImg');
            const video = document.getElementById('previewVideo');
            const submitBtn = document.getElementById('submitBtn');
            const filtersPanel = document.getElementById('filtersPanel');
            
            container.classList.add('active');
            if (file.type.startsWith('image/')) {
                filtersPanel.classList.add('active');
                img.style.display = 'block';
                video.style.display = 'none';
                img.src = URL.createObjectURL(file);
            } else {
                filtersPanel.classList.remove('active');
                img.style.display = 'none';
                video.style.display = 'block';
                video.src = URL.createObjectURL(file);
            }
            submitBtn.classList.add('active');
            submitBtn.disabled = false;
            
            const reader = new FileReader();
            reader.onload = () => { document.getElementById('mediaData').value = reader.result; };
            reader.readAsDataURL(file);
        }
        
        function applyFilter(filter) {
            document.getElementById('previewImg').style.filter = filter;
            document.querySelectorAll('.ig-filter-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.ig-filter-btn').classList.add('active');
        }
        
        document.getElementById('storyForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Публикация...';
            
            const formData = new FormData();
            formData.append('media_data', document.getElementById('mediaData').value);
            
            try {
                const resp = await fetch('{{ url_for("create_story") }}', { method: 'POST', body: formData });
                if (resp.ok) window.location.href = '{{ url_for("index") }}';
                else { alert('Ошибка'); btn.disabled = false; btn.textContent = 'Опубликовать'; }
            } catch (err) { alert(err.message); btn.disabled = false; }
        };
    </script>
</body>
</html>
