{% extends "base.html" %}
{% block title %}Новый пост - Social{% endblock %}
{% block content %}
<div class="create-page">
    <div class="create-card">
        <h2 class="create-title">Новый пост</h2>
        <form method="POST" enctype="multipart/form-data" id="postForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <textarea name="body" class="form-input create-textarea" placeholder="Что у вас нового?"></textarea>
            </div>
            
            <div id="mediaPreview" class="media-preview" style="display: none;">
                <div class="media-grid" id="mediaGrid"></div>
            </div>
            
            <div class="attach-area">
                <label for="media-input" class="attach-label">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21.44 5.05L12.04 14.46a5.5 5.5 0 0 1-7.78 0L2.54 12.7a2 2 0 0 1 2.83-2.83l1.72 1.72 9.91-9.91a2 2 0 0 1 2.83 0l1.72 1.72a2 2 0 0 1 0 2.83z"/></svg>
                    Прикрепить
                </label>
                <input type="file" id="media-input" name="media" accept="image/*,video/*,audio/*,application/*,.pdf,.doc,.docx,.txt" multiple style="display: none;" onchange="handleFiles(this.files)">
                <a href="{{ url_for('photo_editor') }}" class="attach-label" style="text-decoration:none;">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    Редактор фото
                </a>
                <button type="button" class="attach-label" onclick="openMusicSelector()" style="border:none;cursor:pointer;">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                    Музыка
                </button>
            </div>

            <input type="hidden" name="music_track_id" id="musicTrackInput" value="">
            <div id="selectedTrackBadge" class="selected-track-badge" style="display:none;">
                <span id="selectedTrackName"></span>
                <button type="button" onclick="removeMusicTrack()">✕</button>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Опубликовать</button>
                <a href="{{ url_for('index') }}" class="btn btn-outline">Отмена</a>
            </div>
        </form>
    </div>
    
    <script>
        let files = [];
        
        function handleFiles(newFiles) {
            for (let i = 0; i < newFiles.length; i++) {
                files.push(newFiles[i]);
            }
            updatePreview();
            updateFileInput();
        }
        
        function removeFile(index) {
            files.splice(index, 1);
            updatePreview();
            updateFileInput();
        }
        
        function updatePreview() {
            const preview = document.getElementById('mediaPreview');
            const grid = document.getElementById('mediaGrid');
            
            if (files.length === 0) {
                preview.style.display = 'none';
                return;
            }
            
            preview.style.display = 'block';
            grid.innerHTML = '';
            
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'media-item';
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        div.innerHTML = '<img src="' + e.target.result + '">';
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    div.innerHTML = '<div class="video-preview">▶</div>';
                } else if (file.type.startsWith('audio/')) {
                    div.innerHTML = '<div class="audio-preview"><span class="audio-icon">🎵</span><span class="audio-name">' + file.name + '</span></div>';
                } else {
                    div.innerHTML = '<div class="doc-preview"><span class="doc-icon">📄</span><span class="doc-name">' + file.name.substring(0, 10) + '...</span></div>';
                }
                
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '×';
                removeBtn.className = 'remove-btn';
                removeBtn.onclick = function(e) { e.stopPropagation(); removeFile(index); };
                
                div.appendChild(removeBtn);
                grid.appendChild(div);
            });
        }
        
        function updateFileInput() {
            const input = document.getElementById('media-input');
            const dt = new DataTransfer();
            for (let i = 0; i < files.length; i++) {
                dt.items.add(files[i]);
            }
            Object.defineProperty(input, 'files', {
                value: dt.files,
                writable: false,
                configurable: true
            });
        }
        

    </script>
</div>

<div class="music-selector-overlay" id="musicSelectorOverlay">
    <div class="music-selector-modal">
        <h3>🎵 Выберите трек</h3>
        <div id="musicSelectorList" style="min-height:60px;color:var(--text-muted);text-align:center;padding:20px;">Загрузка...</div>
        <button class="music-selector-close" onclick="closeMusicSelector()">Отмена</button>
    </div>
</div>

<script>
let selectedTrackId = null;
function openMusicSelector() {
    const overlay = document.getElementById('musicSelectorOverlay');
    overlay.style.display = 'flex';
    fetch('/music/my_tracks')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('musicSelectorList');
            if (!data.tracks || data.tracks.length === 0) {
                list.innerHTML = '<p style="color:var(--text-muted);padding:20px;">Нет треков. Сначала добавьте музыку в избранное или загрузите свои.</p>';
                return;
            }
            list.innerHTML = '';
            data.tracks.forEach(t => {
                const div = document.createElement('div');
                div.className = 'music-selector-track';
                div.onclick = function() { selectTrack(t.id, t.title, t.artist); };
                div.innerHTML = (t.cover_url ? '<img src="' + t.cover_url + '">' : '<div style="width:40px;height:40px;border-radius:6px;background:var(--brand-gradient);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🎵</div>') +
                    '<div><div class="title">' + escapeHtml(t.title) + '</div><div class="artist">' + escapeHtml(t.artist) + '</div></div>';
                list.appendChild(div);
            });
        })
        .catch(function() {
            document.getElementById('musicSelectorList').innerHTML = '<p style="color:red;padding:20px;">Ошибка загрузки</p>';
        });
}
function closeMusicSelector() {
    document.getElementById('musicSelectorOverlay').style.display = 'none';
}
function selectTrack(id, title, artist) {
    selectedTrackId = id;
    document.getElementById('musicTrackInput').value = id;
    document.getElementById('selectedTrackName').textContent = '🎵 ' + title + ' — ' + artist;
    document.getElementById('selectedTrackBadge').style.display = 'inline-flex';
    closeMusicSelector();
}
function removeMusicTrack() {
    selectedTrackId = null;
    document.getElementById('musicTrackInput').value = '';
    document.getElementById('selectedTrackBadge').style.display = 'none';
}
function escapeHtml(s) {
    if (!s) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}
document.getElementById('musicSelectorOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeMusicSelector();
});
</script>
{% endblock %}
