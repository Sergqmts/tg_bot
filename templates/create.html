{% extends "base.html" %}
{% block title %}Новый пост - Social{% endblock %}
{% block content %}
<div class="create-page">
    <div class="create-card">
        <h2 class="create-title">Новый пост</h2>
        <form method="POST" enctype="multipart/form-data" id="postForm">
            <div class="form-group">
                <textarea name="body" class="form-input create-textarea" placeholder="Что у вас нового?"></textarea>
            </div>
            
            <div id="mediaPreview" class="media-preview" style="display: none;">
                <div class="media-grid" id="mediaGrid"></div>
            </div>
            
            <div class="attach-area">
                <label for="media-input" class="attach-label">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21.44 5.05L12.04 14.46a5.5 5.5 0 0 1-7.78 0L2.54 12.7a2 2 0 0 1 2.83-2.83l1.72 1.72 9.91-9.91a2 2 0 0 1 2.83 0l1.72 1.72a2 2 0 0 1 0 2.83z"/></svg>
                    Прикрепить
                </label>
                <input type="file" id="media-input" name="media" accept="image/*,video/*" multiple style="display: none;" onchange="handleFiles(this.files)">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Опубликовать</button>
                <a href="{{ url_for('index') }}" class="btn btn-outline">Отмена</a>
            </div>
        </form>
    </div>
    
    <script>
        let files = [];
        
        function handleFiles(newFiles) {
            for (let i = 0; i < newFiles.length; i++) {
                files.push(newFiles[i]);
            }
            updatePreview();
        }
        
        function removeFile(index) {
            files.splice(index, 1);
            updatePreview();
            updateFileInput();
        }
        
        function updatePreview() {
            const preview = document.getElementById('mediaPreview');
            const grid = document.getElementById('mediaGrid');
            
            if (files.length === 0) {
                preview.style.display = 'none';
                return;
            }
            
            preview.style.display = 'block';
            grid.innerHTML = '';
            
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'media-item';
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        div.innerHTML = '<img src="' + e.target.result + '">';
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    div.innerHTML = '<div class="video-preview">▶</div>';
                }
                
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '×';
                removeBtn.className = 'remove-btn';
                removeBtn.onclick = function(e) { e.stopPropagation(); removeFile(index); };
                
                div.appendChild(removeBtn);
                grid.appendChild(div);
            });
        }
        
        function updateFileInput() {
            const input = document.getElementById('media-input');
            const dt = new DataTransfer();
            for (let i = 0; i < files.length; i++) {
                dt.items.add(files[i]);
            }
            Object.defineProperty(input, 'files', {
                value: dt.files,
                writable: false,
                configurable: true
            });
        }
    </script>
</div>
{% endblock %}
