{% extends "base.html" %}
{% block title %}Новый пост - Social{% endblock %}
{% block content %}
    <div style="max-width: 470px; margin: 0 auto;">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem; font-weight: 600;">Новый пост</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <textarea name="body" placeholder="Что у вас нового?" style="min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 1rem; resize: vertical;"></textarea>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--text);">Фото или видео</label>
                    <input type="file" name="media" accept="image/*,video/*" style="padding: 10px; border: 1px dashed var(--border); border-radius: var(--radius); width: 100%;">
                    <small style="color: var(--text-light); display: block; margin-top: 8px; font-size: 0.85rem;">PNG, JPG, GIF, MP4, WEBM, MOV (макс. 50MB)</small>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Опубликовать</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
