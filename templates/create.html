{% extends "base.html" %}
{% block title %}Новый пост - Social{% endblock %}
{% block content %}
    <div style="max-width: 470px; margin: 0 auto;">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-size: 1.3rem; font-weight: 600;">Новый пост</h2>
            <form method="POST" enctype="multipart/form-data" id="postForm">
                <div class="form-group">
                    <textarea name="body" placeholder="Что у вас нового?" style="min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 1rem; resize: vertical;"></textarea>
                </div>
                
                <!-- Область для медиа -->
                <div id="mediaPreview" style="display: none; margin-bottom: 15px;">
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;" id="mediaGrid"></div>
                </div>
                
                <div class="form-group">
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                        <a href="{{ url_for('photo_editor') }}" class="btn btn-secondary" style="text-decoration: none;">🎨 Редактор фото</a>
                        <label for="media-input" style="display: inline-flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 16px; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--primary); font-weight: 500;">
                            📎 Прикрепить файл
                        </label>
                    </div>
                    <input type="file" id="media-input" name="media" accept="image/*,video/*" multiple style="display: none;" onchange="handleFiles(this.files)">
                    <small style="color: var(--text-light); display: block; margin-top: 8px; font-size: 0.85rem;">PNG, JPG, GIF, MP4, WEBM, MOV (макс. 50MB)</small>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Опубликовать</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        let files = [];
        
        function handleFiles(newFiles) {
            for (let i = 0; i < newFiles.length; i++) {
                files.push(newFiles[i]);
            }
            updatePreview();
        }
        
        function removeFile(index) {
            files.splice(index, 1);
            updatePreview();
            updateFileInput();
        }
        
        function updatePreview() {
            const preview = document.getElementById('mediaPreview');
            const grid = document.getElementById('mediaGrid');
            
            if (files.length === 0) {
                preview.style.display = 'none';
                return;
            }
            
            preview.style.display = 'block';
            grid.innerHTML = '';
            
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'position: relative; width: 100px; height: 100px; border-radius: 8px; overflow: hidden;';
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        div.innerHTML = '<img src="' + e.target.result + '" style="width: 100%; height: 100%; object-fit: cover;">';
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    div.innerHTML = '<div style="width: 100%; height: 100%; background: #333; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">▶</div>';
                }
                
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '✕';
                removeBtn.style.cssText = 'position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.7); color: white; border: none; cursor: pointer; font-size: 12px;';
                removeBtn.onclick = function(e) { e.stopPropagation(); removeFile(index); };
                
                div.appendChild(removeBtn);
                grid.appendChild(div);
            });
        }
        
        function updateFileInput() {
            const input = document.getElementById('media-input');
            // Создаём новый DataTransfer для каждого обновления
            const dt = new DataTransfer();
            for (let i = 0; i < files.length; i++) {
                dt.items.add(files[i]);
            }
            // Присваиваем новый FileList
            Object.defineProperty(input, 'files', {
                value: dt.files,
                writable: false,
                configurable: true
            });
            console.log('Files updated:', input.files.length);
        }
    </script>
{% endblock %}
