{% extends "base.html" %}
{% block title %}{{ community.name }} - Новая запись - Social{% endblock %}
{% block content %}
<div class="create-page">
    <div class="create-card">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
            <a href="{{ url_for('community', slug=community.slug) }}" class="btn btn-secondary" style="padding: 8px 12px;">←</a>
            <span>Запись в <strong>{{ community.name }}</strong></span>
        </div>
        
        <form method="POST" enctype="multipart/form-data" id="postForm">
            <div class="form-group">
                <textarea name="body" class="form-input create-textarea" placeholder="Что нового в сообществе?"></textarea>
            </div>
            
            <div id="mediaPreview" class="media-preview" style="display: none;">
                <div class="media-grid" id="mediaGrid"></div>
            </div>
            
            <div class="attach-area">
                <label for="media-input" class="attach-label">
                    <svg class="attach-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21.44 5.05L12.04 14.46a5.5 5.5 0 0 1-7.78 0L2.54 12.7a2 2 0 0 1 2.83-2.83l1.72 1.72 9.91-9.91a2 2 0 0 1 2.83 0l1.72 1.72a2 2 0 0 1 0 2.83z"/></svg>
                    Прикрепить
                </label>
                <input type="file" id="media-input" name="media" accept="image/*,video/*,audio/*,application/*,.pdf,.doc,.docx,.txt" multiple style="display: none;" onchange="handleFiles(this.files)">
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Опубликовать</button>
                <a href="{{ url_for('community', slug=community.slug) }}" class="btn btn-outline">Отмена</a>
            </div>
        </form>
    </div>
    
    <script>
        let files = [];
        
        function handleFiles(newFiles) {
            for (let i = 0; i < newFiles.length; i++) {
                files.push(newFiles[i]);
            }
            updatePreview();
        }
        
        function removeFile(index) {
            files.splice(index, 1);
            updatePreview();
            updateFileInput();
        }
        
        function updatePreview() {
            const preview = document.getElementById('mediaPreview');
            const grid = document.getElementById('mediaGrid');
            
            if (files.length === 0) {
                preview.style.display = 'none';
                return;
            }
            
            preview.style.display = 'block';
            grid.innerHTML = '';
            
            files.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'media-item';
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        div.innerHTML = '<img src="' + e.target.result + '">';
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    div.innerHTML = '<div class="video-preview">▶</div>';
                } else if (file.type.startsWith('audio/')) {
                    div.innerHTML = '<div class="audio-preview"><span class="audio-icon">🎵</span><span class="audio-name">' + file.name + '</span></div>';
                } else {
                    div.innerHTML = '<div class="doc-preview"><span class="doc-icon">📄</span><span class="doc-name">' + file.name.substring(0, 10) + '...</span></div>';
                }
                
                const removeBtn = document.createElement('button');
                removeBtn.innerHTML = '×';
                removeBtn.className = 'remove-btn';
                removeBtn.onclick = function(e) { e.stopPropagation(); removeFile(index); };
                div.appendChild(removeBtn);
                grid.appendChild(div);
            });
            
            if (files.length > 0) {
                const formData = new FormData();
                files.forEach(f => formData.append('media', f));
            }
        }
        
        function updateFileInput() {
            const input = document.getElementById('media-input');
            const dt = new DataTransfer();
            files.forEach(f => dt.items.add(f));
            input.files = dt.files;
        }
        
        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch(window.location.href, {
                method: 'POST',
                body: formData
            }).then(() => {
                window.location.href = '{{ url_for("community", slug=community.slug) }}';
            });
        });
    </script>
</div>
{% endblock %}
