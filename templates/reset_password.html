{% extends "base.html" %}
{% block title %}Новый пароль — Vibe{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-brand-start via-brand-middle to-brand-end rounded-2xl flex items-center justify-center text-white text-3xl mx-auto mb-4 shadow-lg">
                <i class="fa-solid fa-key"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 dark:text-white">Новый пароль</h1>
            <p class="text-slate-500 mt-2 text-sm">Придумай надёжный пароль (минимум 6 символов)</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="mb-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-700 rounded-2xl text-sm text-red-700 dark:text-red-300">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <div class="glass rounded-3xl p-8 shadow-lg">
            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <input
                        type="password"
                        name="password"
                        required
                        minlength="6"
                        placeholder="Новый пароль"
                        class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-brand-middle text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
                    >
                </div>
                <div class="form-group">
                    <input
                        type="password"
                        name="confirm_password"
                        required
                        minlength="6"
                        placeholder="Подтверди пароль"
                        class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-2xl py-3 px-4 outline-none focus:ring-2 focus:ring-brand-middle text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400"
                    >
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-brand-start to-brand-middle text-white rounded-2xl font-bold text-sm hover:shadow-lg transition-all cursor-pointer">
                    Сохранить пароль
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
