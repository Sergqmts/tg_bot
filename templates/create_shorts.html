{% extends "base.html" %}
{% block title %}Создать Shorts - Social{% endblock %}
{% block content %}
<style>
.create-shorts-page {
    padding-top: 60px;
    padding-bottom: 70px;
    min-height: 100vh;
}
.create-shorts-form {
    padding: 20px;
}
.upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 40px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
}
.upload-area:hover {
    border-color: var(--primary);
}
.upload-icon {
    font-size: 48px;
    margin-bottom: 10px;
}
textarea {
    width: 100%;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
    font-size: 14px;
    resize: none;
    margin-bottom: 20px;
}
.audio-list {
    margin-bottom: 20px;
}
.audio-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--surface);
    border-radius: var(--radius-md);
    margin-bottom: 8px;
    cursor: pointer;
}
.audio-item.selected {
    border: 2px solid var(--primary);
}
.audio-item input {
    margin-right: 10px;
}
.upload-audio-btn {
    display: inline-block;
    padding: 10px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text);
    cursor: pointer;
    margin-bottom: 20px;
}
.video-preview {
    position: relative;
}
</style>
<div class="create-shorts-page">
    <header class="top-bar">
        <a href="{{ url_for('shorts') }}" class="btn btn-icon">✕</a>
        <h1>Создать Shorts</h1>
    </header>
    <form method="POST" enctype="multipart/form-data" class="create-shorts-form" id="shortsForm">
        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
            <div class="upload-icon" id="uploadIcon">🎬</div>
            <p id="uploadText">Нажмите для выбора видео</p>
            <p style="font-size: 12px; color: var(--text-muted);">или перетащите файл сюда</p>
            <input type="file" name="video" id="videoInput" accept="video/mp4,video/webm" style="display: none;" required onchange="showPreview(this)">
        </div>
        <div id="videoPreview" class="video-preview" style="display: none; margin-bottom: 20px;">
            <video id="previewVideo" controls style="width: 100%; max-height: 300px; border-radius: var(--radius-md);"></video>
            <button type="button" onclick="removeVideo()" style="margin-top: 10px; padding: 8px 16px; background: var(--danger); color: #fff; border: none; border-radius: var(--radius-md);">Удалить</button>
        </div>
        
        <textarea name="caption" rows="3" placeholder="Описание..."></textarea>
        
        <h3>Выберите звук</h3>
        <div class="audio-list">
            <label class="audio-item">
                <input type="radio" name="audio_id" value="" checked>
                <span>Без звука</span>
            </label>
            {% for audio in audios %}
            <label class="audio-item">
                <input type="radio" name="audio_id" value="{{ audio.id }}">
                <span>{{ audio.title }}</span>
            </label>
            {% endfor %}
        </div>
        
        <a href="{{ url_for('upload_shorts_audio') }}" class="upload-audio-btn">+ Загрузить свой звук</a>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Опубликовать</button>
    </form>
</div>
<script>
function showPreview(input) {
    if (input.files && input.files[0]) {
        var file = input.files[0];
        var url = URL.createObjectURL(file);
        document.getElementById('previewVideo').src = url;
        document.getElementById('uploadIcon').style.display = 'none';
        document.getElementById('uploadText').style.display = 'none';
        document.getElementById('videoPreview').style.display = 'block';
    }
}
function removeVideo() {
    document.getElementById('videoInput').value = '';
    document.getElementById('previewVideo').src = '';
    document.getElementById('uploadIcon').style.display = 'block';
    document.getElementById('uploadText').style.display = 'block';
    document.getElementById('videoPreview').style.display = 'none';
}
</script>
{% endblock %}
