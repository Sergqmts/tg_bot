{% extends "base.html" %}
{% block title %}Добавить участника - Social{% endblock %}
{% block content %}
<div class="profile">
    <div class="profile-header">
        <div class="profile-info" style="padding: 0;">
            <a href="{{ url_for('chat_members', chat_id=chat.id) }}" class="btn btn-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <h1 class="profile-username">Добавить</h1>
        </div>
    </div>
    
    <div style="padding: 20px;">
        {% if users %}
        <form method="POST" class="form">
            <div class="form-group">
                <label class="form-label">Выберите пользователя:</label>
                <select name="user_id" required class="form-input">
                    <option value="">-- Выберите --</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Добавить</button>
        </form>
        {% else %}
        <div class="empty-state">
            <div class="empty-icon">👥</div>
            <h3 class="empty-title">Нет пользователей</h3>
            <p class="empty-text">Нет пользователей для добавления</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
